# ═══════════════════════════════════════════════════════════════════════════════
# zsel-orchestrator — Build orchestrator image → ZOT registry
# Runs-on: zsel-general (string, nie array — ARC v2 requirement)
# Build: DOCKER_BUILDKIT=1 docker build (OCI output) → crane push --insecure
# Nie używamy docker/setup-buildx-action (race condition /buildx-refs/ na JIT)
# ═══════════════════════════════════════════════════════════════════════════════
name: Build orchestrator image

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

env:
  ZOT_REGISTRY: 10.43.11.137:5000
  IMAGE_NAME: zsel/orchestrator
  GITOPS_REPO: ZSEL-OPOLE/gitops-infra
  GITOPS_MANIFEST: 06-apps/manifests/zsel-orchestrator/orchestrator.yaml

jobs:

  # ---------------------------------------------------------------------------
  # 1. Lint & Security
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint & Security"
    runs-on: zsel-general
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install --upgrade pip && pip install '.[dev]' ruff bandit

      - name: Ruff lint
        run: ruff check src/ --output-format=github

      - name: Ruff format check
        run: ruff format src/ --check --diff

      - name: Bandit security scan
        run: bandit -r src/ -ll -ii --skip B101

  # ---------------------------------------------------------------------------
  # 2. Build & push → ZOT
  # ---------------------------------------------------------------------------
  build:
    name: "Build orchestrator -> ZOT"
    runs-on: zsel-general
    needs: lint
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 60
    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Image metadata
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          DATE=$(date +%Y%m%d)
          TAG="${DATE}-${SHORT}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Tag: ${{ env.ZOT_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Install crane
        run: |
          set -eo pipefail
          CRANE_VER=0.20.2
          INSTALL_DIR="${HOME}/.local/bin"
          mkdir -p "${INSTALL_DIR}"
          curl --retry 3 --retry-delay 2 -fsSL \
            "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VER}/go-containerregistry_Linux_arm64.tar.gz" \
            | tar -C "${INSTALL_DIR}" -xz crane
          echo "${INSTALL_DIR}" >> "$GITHUB_PATH"
          "${INSTALL_DIR}/crane" version

      - name: Build arm64 image (BuildKit native OCI output)
        run: |
          set -eo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          DOCKER_BUILDKIT=1 docker build \
            --platform linux/arm64 \
            --output "type=oci,dest=/tmp/orchestrator-oci.tar" \
            --tag "${{ env.IMAGE_NAME }}:${TAG}" \
            --no-cache \
            .
          echo "OK build orchestrator done"

      - name: Push to ZOT via crane
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          OCI_DIR="/tmp/orchestrator-oci-layout"
          mkdir -p "${OCI_DIR}"
          tar -xf /tmp/orchestrator-oci.tar -C "${OCI_DIR}"
          crane push --insecure "${OCI_DIR}" "${{ env.ZOT_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          crane push --insecure "${OCI_DIR}" "${{ env.ZOT_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "OK Pushed: ${{ env.ZOT_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          rm -rf /tmp/orchestrator-oci.tar "${OCI_DIR}"

      - name: Verify in ZOT
        run: |
          crane manifest --insecure "${{ env.ZOT_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}" \
            | python3 -c "import json,sys; m=json.load(sys.stdin); print(f'OK orchestrator — {len(m.get(chr(108)+chr(97)+chr(121)+chr(101)+chr(114)+chr(115),[]))} layers')"

  # ---------------------------------------------------------------------------
  # 3. GitOps update — gitops-infra
  # ---------------------------------------------------------------------------
  gitops-update:
    name: "GitOps update"
    runs-on: zsel-general
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout gitops-infra
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update image tag
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          FILE="${{ env.GITOPS_MANIFEST }}"

          if [ ! -f "$FILE" ]; then
            echo "WARN: $FILE nie istnieje w gitops-infra — pomin gitops update"
            exit 0
          fi

          sed -i "s|image: .*${{ env.ZOT_REGISTRY }}/${{ env.IMAGE_NAME }}:.*|image: ${{ env.ZOT_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}|g" "$FILE"
          echo "OK: ${{ env.ZOT_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.GITOPS_MANIFEST }}" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Brak zmian do commitu"
          else
            git commit -m "chore(deploy): orchestrator -> ${{ needs.build.outputs.tag }}"
            git push
            echo "OK GitOps zaktualizowany"
          fi

      - name: Summary
        run: |
          echo "### Orchestrator Build" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ needs.build.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | ${{ env.ZOT_REGISTRY }} |" >> $GITHUB_STEP_SUMMARY
