# ZSEL Orchestrator — lokalne środowisko developerskie
# Uruchomienie: docker compose up
#
# Wymagania lokalne:
#   - Ollama running na hoście (localhost:11434)
#   - lub ustaw ORCH_OLLAMA_BASE_URL na adres klastra przez VPN

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ORCH_OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      ORCH_QDRANT_HOST: qdrant
      ORCH_QDRANT_PORT: "6333"
      ORCH_DATABASE_URL: "postgresql+asyncpg://orchestrator:orchestrator@postgres:5432/orchestrator"
      ORCH_REDIS_URL: "redis://redis:6379/2"
      ORCH_LOG_LEVEL: "DEBUG"
      ORCH_LOCAL_MODE: "false"
      ORCH_WORKSPACE_ROOT: /workspace
      # For testing without real GitHub:
      ORCH_LEARNING_ENABLED: "true"
    volumes:
      - "${WORKSPACE_ROOT:-/Users/lkolo-prez/Documents/LKP/01_ZSEL/SERVERS-CLEAN}:/workspace:ro"
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Vector DB — same version as production cluster
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL (lightweight local)
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: orchestrator
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis — message queue / cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  qdrant_data:
  postgres_data:
